workflows:
  android-release:
    name: FFW Ausweis – Android APK
    max_build_duration: 30
    environment:
      flutter: stable

    scripts:
      - name: Flutter Version
        script: flutter --version

      - name: Abhängigkeiten installieren
        script: flutter pub get

      - name: APK bauen
        script: |
          flutter build apk --debug --no-tree-shake-icons
          echo "=== APK Suche ==="
          find . -name "*.apk" 2>/dev/null
          cp build/app/outputs/flutter-apk/app-debug.apk $CM_BUILD_DIR/app-debug.apk || true

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/**/*.apk
      - "**/*.apk"

    publishing:
      email:
        recipients:
          - enricopaeck@t-online.de
        notify:
          success: true
          failure: true
